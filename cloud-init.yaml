#cloud-config

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: [docker]
    ssh_authorized_keys:
      - ssh-ed25519 AAAA... # Replace with your public key

package_update: true
package_upgrade: true

packages:
  - git
  - ca-certificates
  - software-properties-common

ansible:
  package_name: ansible-core
  install_method: distro
  pull:
    - url: "https://github.com/xunkit/dev-vm-cloud-init.git"
      playbook_names: [ansible/setup.yml]

power_state:
  mode: reboot
  message: "Rebooting to apply kernel updates"
  condition: true

final_message: "Dev VM ready in $UPTIME seconds"
